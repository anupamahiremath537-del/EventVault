<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Safety Portal</title>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();
            alert(result.message);
        }

        async function getAlerts() {
            const response = await fetch('/api/alerts');
            const data = await response.json();
            const container = document.getElementById('alerts-display');
            container.innerHTML = '';
            
            data.alerts.forEach(alert => {
                const alertDiv = document.createElement('div');
                alertDiv.style.border = '1px solid #ccc';
                alertDiv.style.margin = '10px';
                alertDiv.style.padding = '10px';
                alertDiv.style.borderRadius = '8px';
                
                alertDiv.innerHTML = `
                    <h3>${alert.name} (Age: ${alert.age})</h3>
                    <img src="/images/${alert.image}" alt="${alert.name}" style="width: 200px; height: auto; display: block; margin-bottom: 10px;">
                    <p><strong>Status:</strong> ${alert.status}</p>
                    <p><strong>Description:</strong> ${alert.description}</p>
                    <p><strong>Last Seen:</strong> ${alert.last_seen} at ${alert.last_seen_time}</p>
                `;
                container.appendChild(alertDiv);
            });
        }

        async function submitReport() {
            const location = document.getElementById('report-location').value;
            const timeSeen = document.getElementById('report-time').value;
            const details = document.getElementById('report-details').value;

            const response = await fetch('/api/report', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ location, time_seen: timeSeen, details })
            });

            const result = await response.json();
            alert(result.message);
        }

        async function getStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            const container = document.getElementById('stats-display');
            
            let html = `<h3>Total Participants: ${data.total}</h3><ul>`;
            data.details.forEach(item => {
                html += `<li><strong>${item.file}:</strong> ${item.count}</li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        async function emergencyCall() {
            const location = document.getElementById('emergency-location').value;
            const details = document.getElementById('emergency-details').value;

            const response = await fetch('/api/emergency', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ location, details })
            });

            const result = await response.json();
            alert(result.message);
        }
    </script>
</head>
<body>
    <h1>Child Safety Portal</h1>

    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <h2>Get Alerts</h2>
    <button onclick="getAlerts()">Fetch Alerts</button>
    <div id="alerts-display"></div>

    <h2>Submit Report</h2>
    <input type="text" id="report-location" placeholder="Location">
    <input type="text" id="report-time" placeholder="Time Seen">
    <textarea id="report-details" placeholder="Details"></textarea>
    <button onclick="submitReport()">Submit Report</button>

    <h2>Emergency Call</h2>
    <input type="text" id="emergency-location" placeholder="Location">
    <textarea id="emergency-details" placeholder="Details"></textarea>
    <button onclick="emergencyCall()">Call Emergency</button>

    <hr>
    <h2>Participant Statistics</h2>
    <button onclick="getStats()">Show Participant Counts</button>
    <div id="stats-display"></div>
</body>
</html>
